<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Checkers • Kings Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');

        :root {
            --bg: #0a0a0f;
            --panel: #111118;
            --accent: #00f5ff;
            --accent2: #ff00aa;
            --gold: #ffd700;
            --text: #e0e7ff;
            --text-muted: #8b92b0;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 20%, rgba(0, 245, 255, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 560px;
            width: 100%;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: -0.04em;
            margin: 0 0 8px;
            background: linear-gradient(90deg, #e0e7ff, #00f5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }

        .difficulty-selector {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .diff-btn {
            padding: 8px 20px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(17, 17, 24, 0.6);
            color: #8b92b0;
            border: 1px solid rgba(139, 146, 176, 0.3);
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .diff-btn.active {
            background: rgba(0, 245, 255, 0.15);
            color: #00f5ff;
            border-color: #00f5ff;
            box-shadow: 0 0 16px rgba(0, 245, 255, 0.3);
        }

        .diff-btn:hover:not(.active) {
            background: rgba(255,255,255,0.05);
            color: #c4c9e0;
        }

        #status {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0 0 16px;
            padding: 12px 24px;
            background: rgba(17, 17, 24, 0.6);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 9999px;
            color: var(--accent);
            box-shadow: 0 4px 20px rgba(0, 245, 255, 0.1);
            backdrop-filter: blur(12px);
            display: inline-block;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 58px);
            gap: 3px;
            width: fit-content;
            margin: 0 auto 24px;
            padding: 12px;
            background: #111118;
            border-radius: 20px;
            border: 1px solid rgba(0, 245, 255, 0.15);
            box-shadow: 
                0 0 0 1px rgba(0, 245, 255, 0.1),
                0 20px 60px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255,255,255,0.08);
            position: relative;
        }

        #board::before {
            content: '';
            position: absolute;
            inset: -1px;
            background: linear-gradient(145deg, rgba(0,245,255,0.08), transparent);
            border-radius: 21px;
            z-index: -1;
            pointer-events: none;
        }

        .square {
            width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            border-radius: 8px;
            user-select: none;
        }

        .square:hover {
            transform: scale(1.08);
            z-index: 2;
        }

        .square:active {
            transform: scale(0.95);
        }

        .light {
            background: linear-gradient(145deg, #2c354d, #1e2538);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4),
                        0 1px 0 rgba(255,255,255,0.06);
        }

        .dark {
            background: linear-gradient(145deg, #1a1f2e, #111118);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5),
                        0 1px 0 rgba(255,255,255,0.04);
        }

        .red {
            color: #ff2d55;
            filter: drop-shadow(0 0 8px rgba(255, 45, 85, 0.7));
            text-shadow: 0 0 12px rgba(255, 45, 85, 0.5);
        }

        .black {
            color: #a5b4fc;
            filter: drop-shadow(0 0 8px rgba(165, 180, 252, 0.6));
            text-shadow: 0 0 12px rgba(165, 180, 252, 0.4);
        }

        .king {
            font-size: 34px;
            filter: drop-shadow(0 0 14px #ffd700) drop-shadow(0 0 6px #ffd700);
            animation: kingPulse 2.5s ease-in-out infinite;
        }

        @keyframes kingPulse {
            0%, 100% { filter: drop-shadow(0 0 14px #ffd700) drop-shadow(0 0 6px #ffd700); }
            50% { filter: drop-shadow(0 0 22px #ffd700) drop-shadow(0 0 10px #ffd700); }
        }

        .selected {
            box-shadow: 0 0 0 3px #00f5ff,
                        0 0 20px rgba(0, 245, 255, 0.5) !important;
            z-index: 3;
        }

        button {
            font-family: 'Inter', system_ui, sans-serif;
            padding: 14px 32px;
            font-size: 15px;
            font-weight: 600;
            background: transparent;
            color: var(--accent);
            border: 1.5px solid var(--accent);
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            margin: 8px 0 24px;
        }

        button:hover {
            background: rgba(0, 245, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
            transform: translateY(-1px);
        }

        #grok-taunt-box {
            background: rgba(17, 17, 24, 0.7);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 20px;
            padding: 18px 22px;
            max-width: 480px;
            margin: 0 auto;
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            text-align: left;
        }

        #grok-taunt {
            font-size: 15.5px;
            color: #c4c9e0;
            line-height: 1.5;
            min-height: 48px;
            font-style: italic;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 16px 0 8px;
            font-size: 13px;
            color: #8b92b0;
        }

        .stat {
            background: rgba(17, 17, 24, 0.6);
            padding: 6px 14px;
            border-radius: 9999px;
            border: 1px solid rgba(139, 146, 176, 0.2);
        }

        .stat span {
            color: #00f5ff;
            font-weight: 600;
        }

        .customize-panel {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 560px;
            background: rgba(17, 17, 24, 0.95);
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-radius: 24px 24px 0 0;
            padding: 24px;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(30px);
            z-index: 50;
            display: none;
        }

        .customize-panel.open {
            display: block;
        }

        .customize-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .customize-header h3 {
            margin: 0;
            font-size: 18px;
            color: #00f5ff;
        }

        .close-btn {
            background: none;
            border: none;
            color: #8b92b0;
            font-size: 22px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .color-row {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .color-input {
            flex: 1;
        }

        .color-input label {
            display: block;
            font-size: 12px;
            color: #8b92b0;
            margin-bottom: 6px;
        }

        .color-input input[type="color"] {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: none;
        }

        .slider-row {
            margin-bottom: 20px;
        }

        .slider-row label {
            display: block;
            font-size: 12px;
            color: #8b92b0;
            margin-bottom: 6px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #00f5ff;
        }

        .presets {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .preset-btn {
            flex: 1;
            min-width: 70px;
            padding: 10px 12px;
            font-size: 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(139, 146, 176, 0.3);
            color: #c4c9e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .preset-btn:hover {
            background: rgba(0, 245, 255, 0.1);
            border-color: #00f5ff;
        }

        .footer {
            margin-top: 24px;
            font-size: 12.5px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GROK CHECKERS</h1>
        <div class="subtitle">KINGS EDITION • 2026</div>

        <!-- DIFFICULTY SELECTOR -->
        <div class="difficulty-selector">
            <button class="diff-btn" onclick="setDifficulty('easy')">Easy</button>
            <button class="diff-btn active" onclick="setDifficulty('medium')">Medium</button>
            <button class="diff-btn" onclick="setDifficulty('hard')">Hard</button>
        </div>

        <div id="status">Red's turn (You are Red)</div>

        <div id="board"></div>

        <button onclick="resetGame()">NEW GAME</button>

        <button onclick="toggleCustomizePanel()" style="margin: 0 0 16px; padding: 10px 22px; font-size: 13px; border-color: #a5b4fc; color: #a5b4fc;">✨ Customize Pieces</button>

        <!-- STATS -->
        <div class="stats-bar">
            <div class="stat">Wins <span id="stat-wins">0</span></div>
            <div class="stat">Losses <span id="stat-losses">0</span></div>
            <div class="stat">Streak 🔥 <span id="stat-streak">0</span></div>
        </div>

        <!-- GROK TAUNTS -->
        <div id="grok-taunt-box">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 4px;">
                <span style="font-size: 22px; filter: drop-shadow(0 0 6px #00f5ff);">🤖</span>
                <strong style="color: #00f5ff; font-size: 13px; letter-spacing: 1px; font-weight: 600;">GROK SAYS</strong>
            </div>
            <div id="grok-taunt">Ready when you are, human. Let's see what you've got.</div>
        </div>

        <div class="footer">
            Premium dark mode • Difficulty levels • Minimax AI • Grok Taunts<br>
            Built with ❤️ by Melinda & Grok
        </div>
    </div>

    <!-- CUSTOMIZE PANEL -->
    <div id="customize-panel" class="customize-panel">
        <div class="customize-header">
            <h3>Customize Pieces</h3>
            <button class="close-btn" onclick="toggleCustomizePanel()">&times;</button>
        </div>

        <div class="color-row">
            <div class="color-input">
                <label>Red Team</label>
                <input type="color" id="red-color" value="#ff2d55" onchange="updatePieceColors()">
            </div>
            <div class="color-input">
                <label>Black Team</label>
                <input type="color" id="black-color" value="#a5b4fc" onchange="updatePieceColors()">
            </div>
        </div>

        <div class="slider-row">
            <label>Neon Intensity <span id="glow-value">70</span>%</label>
            <input type="range" id="glow-slider" min="20" max="120" value="70" oninput="updatePieceColors()">
        </div>

        <div class="presets">
            <button class="preset-btn" onclick="applyPreset('classic')">Classic</button>
            <button class="preset-btn" onclick="applyPreset('neon')">Neon Nights</button>
            <button class="preset-btn" onclick="applyPreset('royal')">Royal Gold</button>
            <button class="preset-btn" onclick="applyPreset('minimal')">Minimal</button>
        </div>
    </div>

    <script>
        let board = Array(8).fill().map(() => Array(8).fill(null));
        let currentPlayer = 'red';
        let selectedPiece = null;
        let gameOver = false;
        let audioCtx;
        let currentDifficulty = 'medium';

        let stats = JSON.parse(localStorage.getItem('grokCheckersStats')) || {
            wins: 0,
            losses: 0,
            currentStreak: 0,
            bestStreak: 0
        };

        let customSettings = JSON.parse(localStorage.getItem('grokCheckersCustom')) || {
            redColor: '#ff2d55',
            blackColor: '#a5b4fc',
            glowIntensity: 70
        };

        function updateStatsUI() {
            document.getElementById('stat-wins').textContent = stats.wins;
            document.getElementById('stat-losses').textContent = stats.losses;
            document.getElementById('stat-streak').textContent = stats.currentStreak;
        }

        function saveStats() {
            localStorage.setItem('grokCheckersStats', JSON.stringify(stats));
            updateStatsUI();
        }

        function setDifficulty(level) {
            currentDifficulty = level;
            document.querySelectorAll('.diff-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function toggleCustomizePanel() {
            const panel = document.getElementById('customize-panel');
            panel.classList.toggle('open');

            if (panel.classList.contains('open')) {
                document.getElementById('red-color').value = customSettings.redColor;
                document.getElementById('black-color').value = customSettings.blackColor;
                document.getElementById('glow-slider').value = customSettings.glowIntensity;
                document.getElementById('glow-value').textContent = customSettings.glowIntensity;
            }
        }

        function updatePieceColors() {
            const red = document.getElementById('red-color').value;
            const black = document.getElementById('black-color').value;
            const glow = parseInt(document.getElementById('glow-slider').value);

            customSettings.redColor = red;
            customSettings.blackColor = black;
            customSettings.glowIntensity = glow;

            document.getElementById('glow-value').textContent = glow;

            // Update CSS variables
            document.documentElement.style.setProperty('--red-glow', red);
            document.documentElement.style.setProperty('--black-glow', black);

            // Apply to pieces
            document.querySelectorAll('.red').forEach(el => {
                el.style.color = red;
                el.style.filter = `drop-shadow(0 0 ${glow * 0.12}px ${red})`;
                el.style.textShadow = `0 0 ${glow * 0.18}px ${red}`;
            });

            document.querySelectorAll('.black').forEach(el => {
                el.style.color = black;
                el.style.filter = `drop-shadow(0 0 ${glow * 0.12}px ${black})`;
                el.style.textShadow = `0 0 ${glow * 0.18}px ${black}`;
            });

            localStorage.setItem('grokCheckersCustom', JSON.stringify(customSettings));
        }

        function applyPreset(preset) {
            const redInput = document.getElementById('red-color');
            const blackInput = document.getElementById('black-color');
            const glowSlider = document.getElementById('glow-slider');

            if (preset === 'classic') {
                redInput.value = '#ff2d55';
                blackInput.value = '#a5b4fc';
                glowSlider.value = 70;
            } else if (preset === 'neon') {
                redInput.value = '#ff00aa';
                blackInput.value = '#00f5ff';
                glowSlider.value = 95;
            } else if (preset === 'royal') {
                redInput.value = '#ff6b6b';
                blackInput.value = '#ffd700';
                glowSlider.value = 85;
            } else if (preset === 'minimal') {
                redInput.value = '#e63939';
                blackInput.value = '#1d3557';
                glowSlider.value = 35;
            }

            document.getElementById('glow-value').textContent = glowSlider.value;
            updatePieceColors();
        }

        function applyCustomSettings() {
            const red = customSettings.redColor;
            const black = customSettings.blackColor;
            const glow = customSettings.glowIntensity;

            document.documentElement.style.setProperty('--red-glow', red);
            document.documentElement.style.setProperty('--black-glow', black);

            document.querySelectorAll('.red').forEach(el => {
                el.style.color = red;
                el.style.filter = `drop-shadow(0 0 ${glow * 0.12}px ${red})`;
                el.style.textShadow = `0 0 ${glow * 0.18}px ${red}`;
            });

            document.querySelectorAll('.black').forEach(el => {
                el.style.color = black;
                el.style.filter = `drop-shadow(0 0 ${glow * 0.12}px ${black})`;
                el.style.textShadow = `0 0 ${glow * 0.18}px ${black}`;
            });
        }

        const grokTaunts = { /* ... same as before, truncated for brevity ... */ };

        // (All other functions remain the same as previous version)

        function showGrokTaunt(category) {
            const tauntBox = document.getElementById('grok-taunt');
            let pool = grokTaunts[category] || grokTaunts.random;
            let message = pool[Math.floor(Math.random() * pool.length)];

            tauntBox.style.transition = 'opacity 0.15s ease';
            tauntBox.style.opacity = '0';
            setTimeout(() => {
                tauntBox.innerHTML = message;
                tauntBox.style.transition = 'opacity 0.4s cubic-bezier(0.23, 1, 0.32, 1)';
                tauntBox.style.opacity = '1';
            }, 160);
        }

        // ... (rest of the script is identical to previous version)

        function initBoard() {
            board = Array(8).fill().map(() => Array(8).fill(null));
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 8; col++) {
                    if ((row + col) % 2 === 1) board[row][col] = 'black';
                }
            }
            for (let row = 5; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    if ((row + col) % 2 === 1) board[row][col] = 'red';
                }
            }
            gameOver = false;
            renderBoard();
            updateStatus();
            document.getElementById('grok-taunt').innerHTML = "Ready when you are, human. Let's see what you've got.";
            applyCustomSettings();
        }

        function initStats() {
            updateStatsUI();
            document.querySelectorAll('.diff-btn')[1].classList.add('active');
        }

        function initCustom() {
            // Apply saved custom colors on load
            setTimeout(() => {
                applyCustomSettings();
            }, 100);
        }

        initBoard();
        initStats();
        initCustom();
    </script>
</body>
</html>
