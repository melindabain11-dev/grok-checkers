<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Checkers - Kings Edition</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f5f5f5; }
        #board { display: grid; grid-template-columns: repeat(8, 60px); width: 480px; margin: 20px auto; border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
        .square { width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 42px; cursor: pointer; transition: transform 0.1s; }
        .square:hover { transform: scale(1.05); }
        .light { background-color: #f0d9b5; }
        .dark { background-color: #b58863; }
        .red { color: #e63939; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .black { color: #1d3557; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .king { font-size: 36px; text-shadow: 0 0 10px gold, 2px 2px 4px rgba(0,0,0,0.5); }
        #status { font-size: 22px; margin: 15px; font-weight: bold; color: #333; }
        button { padding: 10px 20px; font-size: 16px; background: #457b9d; color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:hover { background: #1d3557; }
    </style>
</head>
<body>
    <h1>Grok Checkers - Kings Edition 👑</h1>
    <div id="status">Red's turn (You are Red)</div>
    <div id="board"></div>
    <button onclick="resetGame()">New Game</button>
    <p style="color:#666; font-size:14px;">Reach the opposite side to promote to King! Kings move in any direction.</p>
    <script>
        let board = Array(8).fill().map(() => Array(8).fill(null));
        let currentPlayer = 'red';
        let selectedPiece = null;

        function initBoard() {
            board = Array(8).fill().map(() => Array(8).fill(null));
            // Place black pieces (top)
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 8; col++) {
                    if ((row + col) % 2 === 1) board[row][col] = 'black';
                }
            }
            // Place red pieces (bottom)
            for (let row = 5; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    if ((row + col) % 2 === 1) board[row][col] = 'red';
                }
            }
            renderBoard();
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');
                    square.className = `square ${(row + col) % 2 === 0 ? 'light' : 'dark'}`;
                    square.dataset.row = row;
                    square.dataset.col = col;
                    if (board[row][col]) {
                        const piece = board[row][col];
                        let symbol;
                        if (piece === 'red') symbol = '🔴';
                        else if (piece === 'black') symbol = '⚫';
                        else symbol = '👑';  // Both kings use crown
                        square.innerHTML = symbol;
                        square.classList.add(piece.startsWith('red') ? 'red' : 'black');
                        if (piece.includes('_king')) {
                            square.classList.add('king');
                        }
                    }
                    square.addEventListener('click', handleClick);
                    boardEl.appendChild(square);
                }
            }
        }

        function handleClick(e) {
            const row = parseInt(e.target.dataset.row);
            const col = parseInt(e.target.dataset.col);
            if (selectedPiece) {
                if (isValidMove(selectedPiece.row, selectedPiece.col, row, col)) {
                    movePiece(selectedPiece.row, selectedPiece.col, row, col);
                    selectedPiece = null;
                    currentPlayer = currentPlayer === 'red' ? 'black' : 'red';
                    document.getElementById('status').textContent = currentPlayer.charAt(0).toUpperCase() + currentPlayer.slice(1) + "'s turn";
                    renderBoard();
                    // Simulate Grok's move if black's turn
                    if (currentPlayer === 'black') {
                        document.getElementById('status').textContent = "Grok is thinking...";
                        setTimeout(grokMove, 600);
                    }
                } else {
                    selectedPiece = null;
                    renderBoard();
                }
            } else if (board[row][col] && board[row][col].startsWith(currentPlayer)) {
                selectedPiece = {row, col};
                highlightSelected(row, col);
            }
        }

        function highlightSelected(row, col) {
            renderBoard();
            const squares = document.querySelectorAll('.square');
            squares.forEach(sq => {
                if (parseInt(sq.dataset.row) === row && parseInt(sq.dataset.col) === col) {
                    sq.style.border = '3px solid #ffd700';
                    sq.style.boxShadow = '0 0 15px #ffd700';
                }
            });
        }

        function isValidMove(fromRow, fromCol, toRow, toCol) {
            const piece = board[fromRow][fromCol];
            if (!piece || board[toRow][toCol] !== null) return false;
            const rowDiff = Math.abs(fromRow - toRow);
            const colDiff = Math.abs(fromCol - toCol);
            if (rowDiff !== 1 || colDiff !== 1) return false;
            if (piece.includes('_king')) {
                return true; // Kings can move in any direction
            } else {
                const dir = piece === 'red' ? -1 : 1;
                return toRow === fromRow + dir;
            }
        }

        function movePiece(fromRow, fromCol, toRow, toCol) {
            let piece = board[fromRow][fromCol];
            board[fromRow][fromCol] = null;
            if (piece && !piece.includes('_king')) {
                // Promote to king if reaching the opposite side
                if ((piece === 'red' && toRow === 0) || (piece === 'black' && toRow === 7)) {
                    piece = piece + '_king';
                }
            }
            board[toRow][toCol] = piece;
        }

        function grokMove() {
            let moves = [];
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const piece = board[row][col];
                    if (piece && piece.includes('black')) {
                        let dirs;
                        if (piece.includes('_king')) {
                            dirs = [[-1, -1], [-1, 1], [1, -1], [1, 1]]; // Any direction for kings
                        } else {
                            dirs = [[1, -1], [1, 1]]; // Forward only for regular
                        }
                        for (let [dr, dc] of dirs) {
                            let nr = row + dr, nc = col + dc;
                            if (nr >= 0 && nr < 8 && nc >= 0 && nc < 8 && board[nr][nc] === null) {
                                moves.push({fromRow: row, fromCol: col, toRow: nr, toCol: nc});
                            }
                        }
                    }
                }
            }
            if (moves.length > 0) {
                const move = moves[Math.floor(Math.random() * moves.length)];
                movePiece(move.fromRow, move.fromCol, move.toRow, move.toCol);
                currentPlayer = 'red';
                document.getElementById('status').textContent = "Red's turn (You)";
                renderBoard();
            } else {
                document.getElementById('status').textContent = "Grok has no moves! You win!";
            }
        }

        function resetGame() {
            initBoard();
            currentPlayer = 'red';
            document.getElementById('status').textContent = "Red's turn (You are Red)";
        }

        initBoard();
    </script>
</body>
</html>
